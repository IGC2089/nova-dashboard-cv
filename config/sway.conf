# Nova Dashboard — Sway Wayland compositor config
# Pi 5, 800×480 HDMI touchscreen

output HDMI-A-2 position 0 0

input type:touchscreen {
    map_to_output HDMI-A-2
}

# No decorations, no gaps
default_border none
default_floating_border none
gaps inner 0
gaps outer 0
font pango:monospace 1

# Hide status bar
bar {
    mode invisible
}

# All windows float — prevents Sway from tiling and resizing our windows
for_window [app_id=".*"] floating enable
for_window [title=".*"] floating enable

# Dashboard: full 800×480, sits below OpenAuto in the z-order
for_window [app_id="nova-dashboard"] resize set 800 480, move position 0 0

# OpenAuto: confined to center zone only, fullscreen request must be overridden
for_window [app_id="autoapp"] fullscreen disable, resize set 400 480, move position 200 0
for_window [app_id="OpenAuto"] fullscreen disable, resize set 400 480, move position 200 0
