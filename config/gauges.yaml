# config/gauges.yaml
# ALL positions are in SVG coordinate space (native 1960x800).
# The renderer converts to screen coords using _svg_pt(x, y).
# Angles: clockwise from 3-o'clock (OpenCV convention).
# start_angle=135 places 0-value at ~7 o'clock; sweep=270 ends at ~5 o'clock.

svg:
  path: "assets/cluster - map.svg"
  native_width: 1960
  native_height: 800

tachometer:
  center:            [333, 380]
  arc_width:         46
  min_val:           0
  max_val:           6000
  label:             "RPM"
  lerp_alpha:        0.15
  arc_color:         [235, 179, 43]
  track_points:
    - [455, 571]
    - [376, 513]
    - [285, 454]
    - [238, 394]
    - [165, 334]
    - [193, 278]
    - [266, 221]
    - [339, 164]

speedometer:
  center:            [1627, 380]
  arc_width:         46
  min_val:           0
  max_val:           240
  label:             "km/h"
  lerp_alpha:        0.10
  arc_color:         [56, 22, 241]
  track_points:
    - [1505, 571]
    - [1584, 513]
    - [1675, 454]
    - [1722, 394]
    - [1795, 334]
    - [1767, 278]
    - [1694, 221]
    - [1621, 164]

center_panel:
  readouts:
    - label:       "BATT"
      state_field: batt_v
      unit:        "V"
      pos:         [850, 180]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "IGN"
      state_field: ign_advance
      unit:        "deg"
      pos:         [1115, 180]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "MAP"
      state_field: map_kpa
      unit:        "kPa"
      pos:         [850, 330]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "CLT"
      state_field: clt_c
      unit:        "C"
      pos:         [1115, 330]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "AFR"
      state_field: afr
      unit:        ""
      pos:         [980, 440]
      format:      "{:.1f}"
      font_scale:  1.8

    - label:       "ODO"
      state_field: odo_km
      unit:        "km"
      pos:         [850, 590]
      format:      "{:.0f}"
      font_scale:  0.7

    - label:       "TRIP"
      state_field: trip_km
      unit:        "km"
      pos:         [1115, 590]
      format:      "{:.1f}"
      font_scale:  0.7
