# config/gauges.yaml
# Angles in degrees, clockwise from 3-o'clock (OpenCV convention).
# start_angle=150 places 0-value at ~8 o'clock.
# sweep=240 gives a 240-degree arc ending at ~4 o'clock.
# Layout: 800x480 — left third [0-267], center [267-533], right [533-800]

tachometer:
  center:       [133, 240]
  radius:       110
  arc_width:    8
  start_angle:  150
  sweep:        240
  min_val:      0
  max_val:      6000
  redzone_val:  4500
  label:        "RPM"
  lerp_alpha:   0.15

speedometer:
  center:       [667, 240]
  radius:       110
  arc_width:    8
  start_angle:  150
  sweep:        240
  min_val:      0
  max_val:      160
  redzone_val:  null
  label:        "MPH"
  lerp_alpha:   0.10

center_panel:
  readouts:
    - label:       "MAP"
      state_field: map_kpa
      unit:        "kPa"
      pos:         [316, 110]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "CLT"
      state_field: clt_f
      unit:        "F"
      pos:         [484, 110]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "AFR"
      state_field: afr
      unit:        ""
      pos:         [400, 240]
      format:      "{:.1f}"
      font_scale:  1.8

    - label:       "ODO"
      state_field: odo_mi
      unit:        "mi"
      pos:         [316, 385]
      format:      "{:.0f}"
      font_scale:  0.7

    - label:       "TRIP"
      state_field: trip_mi
      unit:        "mi"
      pos:         [484, 385]
      format:      "{:.1f}"
      font_scale:  0.7
