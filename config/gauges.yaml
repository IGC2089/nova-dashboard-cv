# config/gauges.yaml
# ALL positions are in SVG coordinate space (native 1960x800).
# fill_svgs: anchor_x/anchor_y are the BOTTOM-LEFT corner of each fill SVG
# in cluster-map coordinates. Fill grows upward from anchor_y.

svg:
  path: "assets/cluster - map.svg"
  native_width: 1960
  native_height: 800

tachometer:
  center:            [333, 380]
  arc_width:         80
  min_val:           0
  max_val:           6000
  label:             "RPM"
  lerp_alpha:        0.15
  arc_color:         [235, 179, 43]
  track_points:
    - [373, 571]
    - [337, 513]
    - [300, 454]
    - [263, 394]
    - [246, 334]
    - [275, 278]
    - [306, 221]
    - [338, 164]

speedometer:
  center:            [1627, 380]
  display_center:    [537, 340]
  arc_width:         80
  min_val:           0
  max_val:           240
  label:             "km/h"
  lerp_alpha:        0.10
  arc_color:         [56, 22, 241]
  track_points:
    - [1587, 571]
    - [1623, 513]
    - [1660, 454]
    - [1697, 394]
    - [1714, 334]
    - [1685, 278]
    - [1654, 221]
    - [1622, 164]

center_panel:
  readouts:
    - label:       "BATT"
      state_field: batt_v
      unit:        "V"
      pos:         [850, 180]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "IGN"
      state_field: ign_advance
      unit:        "deg"
      pos:         [1115, 180]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "MAP"
      state_field: map_kpa
      unit:        "kPa"
      pos:         [850, 330]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "CLT"
      state_field: clt_c
      unit:        "C"
      pos:         [1115, 330]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "AFR"
      state_field: afr
      unit:        ""
      pos:         [980, 440]
      format:      "{:.1f}"
      font_scale:  1.8

    - label:       "ODO"
      state_field: odo_km
      unit:        "km"
      pos:         [850, 590]
      format:      "{:.0f}"
      font_scale:  0.7

    - label:       "TRIP"
      state_field: trip_km
      unit:        "km"
      pos:         [1115, 590]
      format:      "{:.1f}"
      font_scale:  0.7

fill_svgs:
  tachometer:
    path:      "assets/speedometer fill.svg"
    anchor_x:  242
    anchor_y:  623

  speedometer:
    path:      "assets/tachometer fill.svg"
    anchor_x:  1522
    anchor_y:  623

  clt:
    path:      "assets/clt fill.svg"
    anchor_x:  1454
    anchor_y:  624
    min_val:   60
    max_val:   120
    opacity:   1.0

  fuel:
    path:      "assets/fuel fill.svg"
    anchor_x:  344
    anchor_y:  624
    min_val:   0.0
    max_val:   1.0
    opacity:   1.0
