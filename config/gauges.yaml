# config/gauges.yaml
# Positions in fill_svgs are in each panel's own SVG coordinate space.
# Positions in center_panel readouts are in screen pixels (800x480).

layers:
  background:
    path: "assets/background.svg"

  left_panel:
    path: "assets/left.svg"
    native_width: 928
    native_height: 600
    anchor_x: 0        # screen x of panel left edge
    anchor_width: 400  # screen pixels wide
    speed_display: [372, 430]  # speed number position in left.svg SVG coordinates

  right_panel:
    path: "assets/right.svg"
    native_width: 928
    native_height: 584
    anchor_x: 400
    anchor_width: 400

speedometer:
  min_val: 0
  max_val: 240
  lerp_alpha: 0.10

tachometer:
  min_val: 0
  max_val: 6000
  lerp_alpha: 0.15

center_panel:
  readouts:
    - label:       "BATT"
      state_field: batt_v
      unit:        "V"
      pos:         [290, 140]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "IGN"
      state_field: ign_advance
      unit:        "deg"
      pos:         [510, 140]
      format:      "{:.1f}"
      font_scale:  0.9

    - label:       "MAP"
      state_field: map_kpa
      unit:        "kPa"
      pos:         [290, 240]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "CLT"
      state_field: clt_c
      unit:        "C"
      pos:         [510, 240]
      format:      "{:.0f}"
      font_scale:  0.9

    - label:       "AFR"
      state_field: afr
      unit:        ""
      pos:         [400, 320]
      format:      "{:.1f}"
      font_scale:  1.8

    - label:       "ODO"
      state_field: odo_km
      unit:        "km"
      pos:         [290, 410]
      format:      "{:.0f}"
      font_scale:  0.7

    - label:       "TRIP"
      state_field: trip_km
      unit:        "km"
      pos:         [510, 410]
      format:      "{:.1f}"
      font_scale:  0.7

# fill_svgs: anchor_x/anchor_y are BOTTOM-LEFT of the fill image
# in the panel's own SVG coordinate space. Fill grows upward.
# Tune these values after visual inspection on the Pi.
fill_svgs:
  speed:
    path:        "assets/tachometer fill.svg"
    panel:       left_panel
    state_field: speed_kph
    anchor_x:    140
    anchor_y:    590
    min_val:     0
    max_val:     240
    opacity:     1.0

  rpm:
    path:        "assets/speedometer fill.svg"
    panel:       right_panel
    state_field: rpm
    anchor_x:    640
    anchor_y:    572
    min_val:     0
    max_val:     6000
    opacity:     1.0

  fuel:
    path:        "assets/fuel fill.svg"
    panel:       left_panel
    state_field: fuel_pct
    anchor_x:    700
    anchor_y:    590
    min_val:     0.0
    max_val:     1.0
    opacity:     1.0

  clt:
    path:        "assets/clt fill.svg"
    panel:       right_panel
    state_field: clt_c
    anchor_x:    100
    anchor_y:    572
    min_val:     60
    max_val:     120
    opacity:     1.0
